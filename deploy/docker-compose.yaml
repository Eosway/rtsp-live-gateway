services:
  server:
    image: rtsp-live-gateway:latest
    pull_policy: never
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
    #   LOG_LEVEL: 'info'
    #   FFMPEG_PATH: 'ffmpeg'
    #   FFPROBE_PATH: 'ffprobe'
    #   FFMPEG_DECODER: 'auto'
    #   FFMPEG_ENCODER: 'auto'
    #   FFMPEG_HARDWARE_TEMPLATE: 'nvidia'
    #   STREAM_STARTUP_TIMEOUT_MS: '8000'
    #   STREAM_IDLE_GRACE_MS: '15000'
    #   STOP_GRACE_MS: '1500'
    #   MAX_QUEUE_BYTES: '2097152'
    #   MAX_SOURCES: '64'
    #   MAX_VIEWERS_PER_SOURCE: '256'
    #   SSRF_ALLOW_PRIVATE_IP: 'true'
    #   RTSP_HOST_DENYLIST: 'localhost,127.0.0.1,::1'
    #   RTSP_PORT_ALLOWLIST: '554,8554'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/v1/healthz').then((res) => { if (!res.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
