name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: FFmpeg Version
        run: ffmpeg -version

      - name: FFmpeg RTSP Protocol Check
        run: ffmpeg -protocols | grep -E '^  rtsp$|^rtsp$'

      - name: FFmpeg Codecs Snapshot
        run: ffmpeg -codecs

      - name: FFmpeg FLV Muxer Check
        run: ffmpeg -h muxer=flv | grep no_duration_filesize

