name: Release Server Image

on:
  push:
    tags: ['server@*.*.*']

permissions:
  contents: write

jobs:
  release-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve server version from tag
        id: package
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#server@}"
          package_json="apps/server/package.json"

          if [[ "${tag}" == "${version}" || -z "${version}" ]]; then
            echo "::error::Tag must use the format server@<version>, for example server@0.1.0."
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version in tag '${tag}'."
            exit 1
          fi

          package_name="$(node -p "require('./${package_json}').name")"
          package_version="$(node -p "require('./${package_json}').version")"

          if [[ "${package_version}" != "${version}" ]]; then
            echo "::error::Tag version '${version}' does not match ${package_json} version '${package_version}'."
            exit 1
          fi

          archive_name="rtsp-live-gateway-server-${version}.tar.gz"
          deploy_dir_name="rtsp-live-gateway-server-${version}"
          deploy_archive_name="${deploy_dir_name}.tar.gz"
          image_tag="rtsp-live-gateway-server:${version}"

          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "archive_name=${archive_name}" >> "${GITHUB_OUTPUT}"
          echo "deploy_dir_name=${deploy_dir_name}" >> "${GITHUB_OUTPUT}"
          echo "deploy_archive_name=${deploy_archive_name}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Build server image
        run: bash scripts/build-server-image.sh "${{ steps.package.outputs.image_tag }}"

      - name: Prepare deploy bundle directory
        shell: bash
        run: |
          deploy_dir_name="${{ steps.package.outputs.deploy_dir_name }}"
          image_tag="${{ steps.package.outputs.image_tag }}"
          archive_name="${{ steps.package.outputs.archive_name }}"

          bundle_root="${RUNNER_TEMP}/${deploy_dir_name}"
          rm -rf "${bundle_root}"
          mkdir -p "${bundle_root}"

          cp -R deploy/. "${bundle_root}/"
          mkdir -p "${bundle_root}/image"

          sed -i "s|rtsp-live-gateway-server:latest|${image_tag}|g" "${bundle_root}/docker-compose.yaml"
          sed -i "s|rtsp-live-gateway-server.tar.gz|${archive_name}|g" "${bundle_root}/load-server-image.sh"

      - name: Export server image archive into deploy bundle
        run: >
          bash scripts/export-server-image.sh
          "${{ steps.package.outputs.image_tag }}"
          "${{ runner.temp }}/${{ steps.package.outputs.deploy_dir_name }}/image/${{ steps.package.outputs.archive_name }}"

      - name: Pack deploy bundle
        shell: bash
        run: |
          deploy_dir_name="${{ steps.package.outputs.deploy_dir_name }}"
          deploy_archive_name="${{ steps.package.outputs.deploy_archive_name }}"

          tar -C "${RUNNER_TEMP}" -czf "${deploy_archive_name}" "${deploy_dir_name}"

      - name: Create release for tag
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.package.outputs.name }} v${{ steps.package.outputs.version }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: ${{ steps.package.outputs.deploy_archive_name }}
          body: |
            Published deploy archive `${{ steps.package.outputs.deploy_archive_name }}`.
